<!-- Student Dashboard -->
<div class="dashboard-container max-w-5xl mx-auto p-6 space-y-6">
  
  <!-- Overall Performance -->
  <div class="overall-performance">
    <div class="bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-xl overflow-hidden p-6">
      <h2 class="text-xl font-semibold text-foreground tracking-tight mb-4">Overall Performance</h2>
      <div *ngIf="perfOverall !== undefined" class="flex items-center gap-4 mb-4">
        <div class="flex-1 bg-surface-border rounded-full h-3 overflow-hidden">
          <div class="h-full bg-primary rounded-full transition-all duration-500" [style.width.%]="perfOverall"></div>
        </div>
        <span class="text-sm font-semibold text-foreground">{{ perfOverall }}%</span>
      </div>
      <div class="chart-wrapper" *ngIf="perfOverallPlotter && perfOverallPlotter.chartConfig">
        <app-util-chart [config]="perfOverallPlotter.chartConfig"></app-util-chart>
      </div>
    </div>
  </div>

  <!-- Gamification Section -->
  <div class="gamification-section" *ngIf="gamificationProfile">
    <div class="bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-surface-border">
        <h3 class="text-lg font-semibold text-foreground tracking-tight flex items-center gap-2">
          <i class="fa-solid fa-trophy text-amber-500"></i>
          Student Profile
        </h3>
      </div>
      <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- XP Progress Bar Component -->
        <div class="md:col-span-1 p-4 bg-surface/50 border border-surface-border rounded-xl">
          <ui-xp-bar 
            [currentXp]="gamificationProfile.xp" 
            [maxXp]="1000" 
            [level]="gamificationProfile.level">
          </ui-xp-bar>
        </div>
        
        <!-- Gamification Stats -->
        <div class="md:col-span-2 grid grid-cols-2 gap-4">
          <div class="flex items-center gap-4 p-4 bg-surface border border-surface-border rounded-xl transition-transform duration-300 hover:-translate-y-1 hover:shadow-glow-sm">
            <div class="w-12 h-12 rounded-full bg-orange-500/10 flex items-center justify-center border border-orange-500/20">
              <i class="fa-solid fa-fire text-2xl text-orange-500"></i>
            </div>
            <div>
              <span class="block text-xl font-bold text-foreground">{{ gamificationProfile.streakDays }} Days</span>
              <span class="text-sm font-medium text-muted uppercase tracking-wider">Current Streak</span>
            </div>
          </div>
          <div class="flex items-center gap-4 p-4 bg-surface border border-surface-border rounded-xl transition-transform duration-300 hover:-translate-y-1 hover:shadow-glow-sm">
            <div class="w-12 h-12 rounded-full bg-indigo-500/10 flex items-center justify-center border border-indigo-500/20">
              <i class="fa-solid fa-award text-2xl text-indigo-500"></i>
            </div>
            <div>
              <span class="block text-xl font-bold text-foreground">{{ gamificationProfile.badges.length || 0 }} Earned</span>
              <span class="text-sm font-medium text-muted uppercase tracking-wider">Total Badges</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Badges Display -->
      <div *ngIf="gamificationProfile.badges && gamificationProfile.badges.length > 0" class="px-6 py-4 border-t border-surface-border">
        <h4 class="text-xs font-semibold text-muted uppercase tracking-wider mb-3">Earned Achievements</h4>
        <div class="flex flex-wrap gap-3">
          <ui-badge *ngFor="let badge of gamificationProfile.badges" variant="xp">
            {{ badge }}
          </ui-badge>
        </div>
      </div>
    </div>
  </div>

  <!-- Next Lessons -->
  <div class="bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-xl overflow-hidden p-6">
    <h2 class="text-xl font-semibold text-foreground tracking-tight mb-4">Next Lessons</h2>
    <app-progress-bar [parentList]="nextLessonSectionData" (onGrandChildClick)="clickByLessonSection($event)"></app-progress-bar>
  </div>

  <!-- Completed Lessons -->
  <div class="bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-xl overflow-hidden p-6">
    <h2 class="text-xl font-semibold text-foreground tracking-tight mb-4">Completed Lessons</h2>
    <app-progress-bar [parentList]="completedLessonSectionData"></app-progress-bar>
  </div>

  <!-- Pending Lessons -->
  <div class="bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-xl overflow-hidden p-6">
    <h2 class="text-xl font-semibold text-foreground tracking-tight mb-4">Pending Lessons</h2>
    <app-progress-bar [parentList]="pendingLessonSectionData"></app-progress-bar>
  </div>
</div>

<!-- Standard Dashboard -->
<div class="max-w-5xl mx-auto p-6 space-y-6">

  <!-- Overall Performance -->
  <div class="bg-surface border border-border rounded-lg p-6">
    <h2 class="text-lg font-semibold text-foreground mb-4">Overall Performance</h2>
    <div *ngIf="perfOverall !== undefined" class="flex items-center gap-4 mb-4">
      <div class="flex-1 bg-border rounded-full h-2 overflow-hidden">
        <div class="h-full bg-primary rounded-full transition-all duration-500" [style.width.%]="perfOverall"></div>
      </div>
      <span class="text-sm font-semibold text-foreground">{{ perfOverall }}%</span>
    </div>
  </div>

  <!-- Progress by Subject -->
  <div class="bg-surface border border-border rounded-lg p-6">
    <h2 class="text-lg font-semibold text-foreground mb-4">Progress by Subject</h2>
    <app-progress-bar [parentList]="perfPerSubject" (onParentClick)="clickBySubject($event)"></app-progress-bar>
  </div>

  <!-- Progress by Student -->
  <div class="bg-surface border border-border rounded-lg p-6">
    <h2 class="text-lg font-semibold text-foreground mb-4">Progress by Student</h2>
    <app-progress-bar [parentList]="perfPerStudent" (onParentClick)="clickByStudent($event)"></app-progress-bar>
  </div>
</div>

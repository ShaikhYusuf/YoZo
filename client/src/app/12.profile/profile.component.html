<div class="profile-container p-6 flex justify-center">
  <mat-card class="profile-card w-full max-w-md">
    <mat-card-header class="flex flex-col items-center pb-4">
      <div class="avatar-circle bg-primary text-white w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-4">
        {{ userName.charAt(0) }}
      </div>
      <mat-card-title class="text-2xl">{{ userName }}</mat-card-title>
      <mat-card-subtitle class="text-lg">{{ userRole }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="pt-4 border-t">
      <div class="info-row flex justify-between py-2">
        <span class="text-gray-600 font-semibold">Email:</span>
        <span>{{ userEmail }}</span>
      </div>
      <div class="info-row flex justify-between py-2">
        <span class="text-gray-600 font-semibold">Status:</span>
        <span class="text-green-600">Active</span>
      </div>
    </mat-card-content>
    <mat-card-actions class="flex justify-center pt-4">
      <button mat-raised-button color="primary">Edit Profile</button>
    </mat-card-actions>
  </mat-card>
</div>

<!-- True or False Component -->
<div class="bg-surface border border-border rounded-lg overflow-hidden">
  <div class="px-6 py-4 border-b border-border flex items-center justify-between">
    <span class="text-lg font-semibold text-foreground">True or False</span>
    <div class="flex gap-2">
      <button (click)="readAloud()" *ngIf="isStudent && !isReading && !isPaused" class="text-muted hover:text-foreground p-2 rounded-md hover:bg-surface-hover transition-colors" title="Read Aloud"><i class="fa-solid fa-volume-high"></i></button>
      <button (click)="pauseReading()" *ngIf="isStudent && isReading && !isPaused" class="text-muted hover:text-foreground p-2 rounded-md hover:bg-surface-hover transition-colors" title="Pause Reading"><i class="fa-solid fa-pause"></i></button>
      <button (click)="resumeReading()" *ngIf="isStudent && isPaused" class="text-muted hover:text-foreground p-2 rounded-md hover:bg-surface-hover transition-colors" title="Resume Reading"><i class="fa-solid fa-play"></i></button>
      <button (click)="stopReading()" *ngIf="isStudent && (isReading || isPaused)" class="text-danger hover:text-danger p-2 rounded-md hover:bg-danger-light transition-colors" title="Stop Reading"><i class="fa-solid fa-stop"></i></button>
    </div>
  </div>
  <div class="p-6 space-y-6">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="space-y-4">
      <app-skeleton-loader type="heading"></app-skeleton-loader>
      <app-skeleton-loader type="card" height="120px"></app-skeleton-loader>
      <app-skeleton-loader type="card" height="120px"></app-skeleton-loader>
    </div>

    <!-- Error State -->
    <div *ngIf="isError" class="flex flex-col items-center justify-center py-10 text-center">
      <div class="w-16 h-16 bg-danger-light text-danger rounded-full flex items-center justify-center mb-4 text-2xl">
        <i class="fa-solid fa-circle-exclamation"></i>
      </div>
      <h3 class="text-lg font-semibold text-foreground mb-2">Evaluation generation failed</h3>
      <p class="text-muted mb-6 max-w-sm">{{ errorMessage }}</p>
      <button (click)="retry()" class="h-10 bg-primary text-white font-medium px-6 rounded-md transition-colors hover:bg-primary-hover flex items-center gap-2">
        <i class="fa-solid fa-rotate-right"></i>
        Retry Evaluation
      </button>
    </div>

    <!-- Empty/No Data State -->
    <div *ngIf="!isLoading && !isError && trueFalseQuestions.length === 0" class="flex flex-col items-center justify-center py-10 text-center text-muted">
       <i class="fa-solid fa-file-circle-question text-4xl mb-3"></i>
       <p>No true/false questions available for this section.</p>
       <button (click)="retry()" class="mt-4 text-primary font-medium hover:underline">Request New Questions</button>
    </div>

    <!-- Content State -->
    <ng-container *ngIf="!isLoading && !isError && trueFalseQuestions.length > 0">
      <div *ngFor="let eachTrueFalse of trueFalseQuestions; let qIndex = index" class="p-4 bg-surface border border-border rounded-lg">
        <div class="flex items-start justify-between mb-3 gap-4">
          <p class="font-medium text-foreground">{{ eachTrueFalse.question }}</p>
          <button *ngIf="isStudent" 
            (click)="startListening(qIndex)" 
            [class.animate-pulse]="isListeningToQuestion === qIndex" 
            [class.text-danger]="isListeningToQuestion === qIndex" 
            [class.text-muted]="isListeningToQuestion !== qIndex" 
            class="p-2 rounded-md hover:bg-surface-hover transition-colors focus-visible:outline-none flex-shrink-0" 
            title="Answer by Voice">
            <i class="fa-solid fa-microphone"></i>
          </button>
        </div>
        <div class="flex gap-3">
          <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-md border cursor-pointer transition-colors"
            [ngClass]="{
              'border-primary bg-primary-light': eachTrueFalse.selectedAnswer === true && !eachTrueFalse.answered,
              'border-success-border bg-success-light': eachTrueFalse.answered && eachTrueFalse.answer === true,
              'border-danger-border bg-danger-light': eachTrueFalse.answered && eachTrueFalse.selectedAnswer === true && eachTrueFalse.answer !== true,
              'border-border hover:border-primary/50': eachTrueFalse.selectedAnswer !== true && !eachTrueFalse.answered
            }">
            <input type="radio" [name]="'tf-' + eachTrueFalse.question" [value]="true" [(ngModel)]="eachTrueFalse.selectedAnswer" class="accent-primary" />
            True
          </label>
          <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-md border cursor-pointer transition-colors"
            [ngClass]="{
              'border-primary bg-primary-light': eachTrueFalse.selectedAnswer === false && !eachTrueFalse.answered,
              'border-success-border bg-success-light': eachTrueFalse.answered && eachTrueFalse.answer === false,
              'border-danger-border bg-danger-light': eachTrueFalse.answered && eachTrueFalse.selectedAnswer === false && eachTrueFalse.answer !== false,
              'border-border hover:border-primary/50': eachTrueFalse.selectedAnswer !== false && !eachTrueFalse.answered
            }">
            <input type="radio" [name]="'tf-' + eachTrueFalse.question" [value]="false" [(ngModel)]="eachTrueFalse.selectedAnswer" class="accent-primary" />
            False
          </label>
        </div>
        <div *ngIf="eachTrueFalse.answered" class="mt-2 flex items-center gap-2 text-sm">
          <i *ngIf="eachTrueFalse.selectedAnswer === eachTrueFalse.answer" class="fa-solid fa-circle-check text-success"></i>
          <i *ngIf="eachTrueFalse.selectedAnswer !== eachTrueFalse.answer" class="fa-solid fa-circle-xmark text-danger"></i>
          <span [class]="eachTrueFalse.selectedAnswer === eachTrueFalse.answer ? 'text-success' : 'text-danger'">
            {{ eachTrueFalse.selectedAnswer === eachTrueFalse.answer ? 'Correct!' : 'Incorrect' }}
          </span>
        </div>
      </div>
      <div class="flex gap-3">
        <button class="h-10 bg-primary text-white font-medium px-6 rounded-md transition-colors hover:bg-primary-hover active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none" (click)="submitAnswers()" [disabled]="!isAnyAnswerSelected()">Submit</button>
        <button class="h-10 text-muted hover:text-foreground font-medium px-4 rounded-md transition-colors hover:bg-surface-hover" (click)="resetTrueFalse()">Reset</button>
      </div>
    </ng-container>
  </div>
</div>

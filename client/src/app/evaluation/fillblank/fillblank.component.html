<!-- Fill in the Blank Component -->
<div class="bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-xl overflow-hidden">
  <div class="px-6 py-4 border-b border-surface-border flex items-center justify-between">
    <span class="text-lg font-semibold text-foreground tracking-tight">Fill in the Blank</span>
    <div class="flex gap-2">
      <button (click)="readAloud()" *ngIf="!isReading" class="text-primary hover:text-primary-hover p-1.5 rounded-md hover:bg-primary-light transition-colors"><i class="fa-solid fa-volume-high"></i></button>
      <button (click)="stopReading()" *ngIf="isReading" class="text-red-500 hover:text-red-600 p-1.5 rounded-md hover:bg-red-50 transition-colors"><i class="fa-solid fa-stop"></i></button>
    </div>
  </div>
  <div class="p-6 space-y-6">
    <div *ngFor="let eachFillBlank of fillBlanks" class="p-4 bg-surface border border-surface-border rounded-lg">
      <p class="text-foreground mb-3 flex flex-wrap items-center gap-1">
        <span>{{ eachFillBlank.question.split("______")[0] }}</span>
        <select [(ngModel)]="eachFillBlank.selectedAnswer"
          class="bg-surface border border-surface-border rounded-lg px-3 py-1.5 text-sm text-foreground outline-none transition-all duration-200 focus:border-primary focus:ring-2 focus:ring-primary/20 appearance-none cursor-pointer mx-1">
          <option *ngFor="let option of eachFillBlank.options; let i = index" [value]="i">{{ option }}</option>
        </select>
        <span>{{ eachFillBlank.question.split("______")[1] }}</span>
      </p>
      <div *ngIf="eachFillBlank.answered" class="flex items-center gap-2 text-sm">
        <i *ngIf="eachFillBlank.selectedAnswer === eachFillBlank.answer" class="fa-solid fa-circle-check text-green-500"></i>
        <i *ngIf="eachFillBlank.selectedAnswer !== eachFillBlank.answer" class="fa-solid fa-circle-xmark text-red-500"></i>
        <span [class]="eachFillBlank.selectedAnswer === eachFillBlank.answer ? 'text-green-700' : 'text-red-700'">
          {{ eachFillBlank.selectedAnswer === eachFillBlank.answer ? 'Correct!' : 'Incorrect' }}
        </span>
      </div>
    </div>
    <div class="flex gap-3">
      <button class="btn-brand" (click)="submitAnswers()" [disabled]="!isAnyAnswerSelected()">Submit</button>
      <button class="bg-surface text-foreground font-medium px-5 py-2.5 rounded-lg border border-surface-border transition-all duration-200 hover:bg-surface-hover active:scale-95" (click)="resetFillBlank()">Reset</button>
    </div>
  </div>
</div>

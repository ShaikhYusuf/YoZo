<!-- Student Management Page -->
<div class="max-w-5xl mx-auto p-6 space-y-6">
  <div class="bg-surface border border-border rounded-lg overflow-hidden">
    <div class="px-6 py-4 border-b border-border flex items-center justify-between">
      <h2 class="text-lg font-semibold text-foreground">Students</h2>
      <button (click)="toggleForm()" class="inline-flex items-center gap-2 h-10 bg-primary text-white font-medium px-4 rounded-md transition-colors hover:bg-primary-hover focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:scale-[0.98]">
        <i class="fa-solid" [ngClass]="isFormVisible ? 'fa-pen' : 'fa-plus'"></i>
        {{ isFormVisible ? 'Edit' : 'Add Student' }}
      </button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="text-sm text-muted border-b border-border">
          <tr>
            <th class="px-6 py-3 font-medium">Name</th>
            <th class="px-6 py-3 font-medium">Username</th>
            <th class="px-6 py-3 font-medium text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let element of dataSource" class="group border-b border-border hover:bg-surface-hover transition-colors">
            <td class="px-6 py-3 text-foreground font-medium">{{ element.name }}</td>
            <td class="px-6 py-3 text-muted">{{ element.username }}</td>
            <td class="px-6 py-3 text-right">
              <div class="inline-flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <button (click)="editStudent(element)" title="Edit" class="text-muted hover:text-foreground transition-colors p-2 rounded-md hover:bg-surface-hover"><i class="fa-solid fa-pen-to-square"></i></button>
                <button (click)="deleteStudent(element.Id!)" title="Delete" class="text-muted hover:text-danger transition-colors p-2 rounded-md hover:bg-danger-light"><i class="fa-solid fa-trash"></i></button>
                <button (click)="onProgresss(element.Id!)" title="View Progress" class="text-muted hover:text-foreground transition-colors p-2 rounded-md hover:bg-surface-hover"><i class="fa-solid fa-chart-line"></i></button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  @if (isFormVisible) {
    <div class="bg-surface border border-border rounded-lg overflow-hidden animate-slide-down">
      <div class="px-6 py-4 border-b border-border">
        <h3 class="text-lg font-semibold text-foreground">{{ isEditMode ? 'Update Student' : 'Add Student' }}</h3>
      </div>
      <div class="p-6">
        <form [formGroup]="studentForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label class="mb-1 text-sm font-medium text-foreground">Name</label>
            <input formControlName="name" placeholder="Student Name" class="w-full h-10 bg-surface border border-border rounded-md px-4 text-base text-foreground outline-none transition-colors focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary placeholder:text-muted" />
            <span *ngFor="let error of getErrorMessages('name')" class="text-danger text-sm mt-1">{{ error }}</span>
          </div>
          <div class="flex flex-col">
            <label class="mb-1 text-sm font-medium text-foreground">Username / ID</label>
            <input formControlName="username" placeholder="Student Username" class="w-full h-10 bg-surface border border-border rounded-md px-4 text-base text-foreground outline-none transition-colors focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary placeholder:text-muted" />
            <span *ngFor="let error of getErrorMessages('username')" class="text-danger text-sm mt-1">{{ error }}</span>
          </div>
          <div class="col-span-full flex items-center gap-3 pt-2">
            <button type="submit" [disabled]="studentForm.invalid" class="h-10 bg-primary text-white font-medium px-6 rounded-md transition-colors hover:bg-primary-hover active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none">{{ isEditMode ? 'Update' : 'Add Student' }}</button>
            <button type="button" (click)="toggleForm()" class="h-10 text-muted hover:text-foreground font-medium px-4 rounded-md transition-colors hover:bg-surface-hover">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  }
</div>

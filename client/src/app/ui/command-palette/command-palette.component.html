@if (isVisible) {
  <!-- Backdrop -->
  <div 
    class="fixed inset-0 z-[100] bg-background/50 backdrop-blur-sm transition-opacity"
    (click)="closePalette()"
  ></div>

  <!-- Modal -->
  <div 
    class="fixed inset-0 z-[101] flex items-start justify-center pt-[15vh] px-4 sm:px-0 pointer-events-none"
  >
    <div 
      class="w-full max-w-2xl bg-surface/90 backdrop-blur-xl border border-surface-border shadow-glass-lg rounded-xl overflow-hidden pointer-events-auto animate-slide-down flex flex-col"
      (click)="$event.stopPropagation()"
    >
      <!-- Search Input -->
      <div class="px-4 py-4 border-b border-surface-border flex items-center gap-3">
        <i class="fa-solid fa-magnifying-glass text-muted text-lg"></i>
        <input 
          #searchInput
          type="text" 
          [(ngModel)]="searchQuery"
          (ngModelChange)="selectedIndex = 0"
          placeholder="Search for commands, pages, or settings..." 
          class="flex-1 bg-transparent border-none outline-none text-lg text-foreground placeholder:text-muted/70 selection:bg-primary/30"
        />
        <div class="hidden sm:flex items-center gap-1">
          <kbd class="px-2 py-1 bg-surface-hover rounded text-xs text-muted font-sans border border-surface-border shadow-subtle">ESC</kbd>
        </div>
      </div>

      <!-- Results List -->
      <div class="max-h-[60vh] overflow-y-auto p-2 scrollbar-hide">
        
        @if (filteredCommands.length > 0) {
          <!-- Just showing a single flat list for now, but grouping visually could go here -->
          <div class="space-y-1">
            <button
              *ngFor="let item of filteredCommands; let i = index"
              (click)="executeCommand(item)"
              (mouseenter)="selectedIndex = i"
              class="w-full flex items-center justify-between px-4 py-3 rounded-lg text-left transition-colors duration-100"
              [class.bg-primary-light]="selectedIndex === i"
              [class.text-primary]="selectedIndex === i"
              [class.text-foreground]="selectedIndex !== i"
              [class.hover:bg-surface-hover]="selectedIndex !== i"
            >
              <div class="flex items-center gap-4">
                <i class="fa-solid {{ item.icon }} w-5 text-center" [class.text-primary]="selectedIndex === i" [class.text-muted]="selectedIndex !== i"></i>
                <span class="font-medium">{{ item.label }}</span>
              </div>
              <span class="text-xs uppercase tracking-wider font-semibold" [class.text-primary]="selectedIndex === i" [class.text-muted]="selectedIndex !== i">{{ item.category }}</span>
            </button>
          </div>
        } @else {
          <div class="py-12 flex flex-col items-center justify-center text-center opacity-70">
            <i class="fa-solid fa-ghost text-4xl text-muted mb-4"></i>
            <p class="text-foreground font-medium">No results found.</p>
            <p class="text-sm text-muted mt-1">Try searching for "Dashboard" or "Profile"</p>
          </div>
        }
      </div>

      <!-- Footer Instructions -->
      <div class="bg-surface-hover/50 px-4 py-3 border-t border-surface-border flex items-center gap-4 text-xs text-muted">
        <div class="flex items-center gap-1.5">
          <kbd class="px-1.5 py-0.5 bg-surface border border-surface-border rounded shadow-subtle">↑</kbd>
          <kbd class="px-1.5 py-0.5 bg-surface border border-surface-border rounded shadow-subtle">↓</kbd>
          <span>to navigate</span>
        </div>
        <div class="flex items-center gap-1.5">
          <kbd class="px-1.5 py-0.5 bg-surface border border-surface-border rounded shadow-subtle">↵</kbd>
          <span>to select</span>
        </div>
      </div>
    </div>
  </div>
}

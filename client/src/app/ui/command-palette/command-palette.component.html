@if (isVisible) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-command bg-background/50 backdrop-blur-sm transition-opacity"
    (click)="closePalette()"
  ></div>

  <!-- Modal -->
  <div class="fixed inset-0 z-toast flex items-start justify-center pt-24 px-4 pointer-events-none">
    <div
      class="w-full max-w-2xl bg-surface border border-border shadow-lg rounded-lg overflow-hidden pointer-events-auto animate-slide-down flex flex-col"
      (click)="$event.stopPropagation()"
    >
      <!-- Search Input -->
      <div class="px-4 py-4 border-b border-border flex items-center gap-3">
        <i class="fa-solid fa-magnifying-glass text-muted text-lg"></i>
        <input
          #searchInput
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="selectedIndex = 0"
          placeholder="Search for commands, pages, or settings..."
          class="flex-1 bg-transparent border-none outline-none text-lg text-foreground placeholder:text-muted"
        />
        <kbd class="px-2 py-1 bg-surface-hover rounded text-xs text-muted font-sans border border-border">ESC</kbd>
      </div>

      <!-- Results List -->
      <div class="max-h-[60vh] overflow-y-auto p-2 scrollbar-hide">
        @if (filteredCommands.length > 0) {
          <div class="space-y-1">
            <button
              *ngFor="let item of filteredCommands; let i = index"
              (click)="executeCommand(item)"
              (mouseenter)="selectedIndex = i"
              class="w-full flex items-center justify-between px-4 py-3 rounded-md text-left transition-colors"
              [class.bg-primary-light]="selectedIndex === i"
              [class.text-primary]="selectedIndex === i"
              [class.text-foreground]="selectedIndex !== i"
              [class.hover:bg-surface-hover]="selectedIndex !== i"
            >
              <div class="flex items-center gap-4">
                <i class="fa-solid {{ item.icon }} w-5 text-center" [class.text-primary]="selectedIndex === i" [class.text-muted]="selectedIndex !== i"></i>
                <span class="font-medium">{{ item.label }}</span>
              </div>
              <span class="text-xs text-muted font-medium">{{ item.category }}</span>
            </button>
          </div>
        } @else {
          <div class="py-12 flex flex-col items-center justify-center text-center">
            <p class="text-foreground font-medium">No results found.</p>
            <p class="text-sm text-muted mt-1">Try searching for "Dashboard" or "Profile"</p>
          </div>
        }
      </div>

      <!-- Footer Instructions -->
      <div class="bg-surface-hover/50 px-4 py-3 border-t border-border flex items-center gap-4 text-xs text-muted">
        <div class="flex items-center gap-1">
          <kbd class="px-1 py-0.5 bg-surface border border-border rounded text-xs">↑</kbd>
          <kbd class="px-1 py-0.5 bg-surface border border-border rounded text-xs">↓</kbd>
          <span>to navigate</span>
        </div>
        <div class="flex items-center gap-1">
          <kbd class="px-1 py-0.5 bg-surface border border-border rounded text-xs">↵</kbd>
          <span>to select</span>
        </div>
      </div>
    </div>
  </div>
}

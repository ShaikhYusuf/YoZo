<div class="w-full flex flex-col gap-2 pt-2">
  <div *ngIf="showLabel" class="flex justify-between items-end mb-1">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 rounded-full bg-warning-light flex items-center justify-center border border-warning-border">
        <i class="fa-solid fa-star text-xs text-warning"></i>
      </div>
      <span class="text-sm font-semibold text-foreground">Level {{ level }}</span>
    </div>
    <span class="text-xs font-mono font-medium text-muted">
      <span class="text-warning">{{ currentXp }}</span> / {{ maxXp }} XP
    </span>
  </div>

  <div class="h-2 w-full bg-surface-hover rounded-full overflow-hidden border border-border">
    <div
      class="h-full bg-warning rounded-full transition-all relative overflow-hidden"
      [style.width.%]="animatedWidth"
      style="transition-duration: 1s; transition-timing-function: ease-out;"
    >
      <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full animate-shimmer"></div>
    </div>
  </div>
</div>

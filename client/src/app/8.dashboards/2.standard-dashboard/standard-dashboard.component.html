<div class="dashboard-container">
  <div class="overall-performance">
    <mat-card class="overall-performance-card">
      <h2>Overall Performance</h2>
      <div *ngIf="perfOverall !== undefined" class="overall-bar">
        <mat-progress-bar mode="determinate" [value]="perfOverall"></mat-progress-bar>
        <span class="perf-label">{{ perfOverall }}%</span>
      </div>
    </mat-card>
  </div>

  <mat-card class="dashboard-card">
    <h2>Progress by Subject</h2>
    <app-progress-bar
      [parentList]="perfPerSubject"
      (onParentClick)="clickBySubject($event)"
    ></app-progress-bar>
  </mat-card>

  <mat-card class="dashboard-card">
    <h2>Progress by Student</h2>
    <app-progress-bar
      [parentList]="perfPerStudent"
      (onParentClick)="clickByStudent($event)"
    ></app-progress-bar>
  </mat-card>
</div>

<!-- Full-screen centered login -->
<div class="min-h-screen flex items-center justify-center bg-brand-gradient animate-gradientBackground px-4">
  
  <!-- Glassmorphic Login Card -->
  <div class="w-full max-w-md bg-surface/90 backdrop-blur-lg border border-surface-border shadow-glass rounded-2xl p-8 animate-slideDown">
    
    <!-- Logo / Brand -->
    <div class="text-center mb-8 flex flex-col items-center">
      <div class="flex justify-center items-center w-16 h-16 rounded-full bg-surface shadow-md mb-4 animate-fadeIn">
        <mat-icon class="text-4xl text-brand-indigo">school</mat-icon>
      </div>
      <h1 class="text-3xl font-bold text-foreground tracking-tight">Learn<span class="text-brand-peach font-extrabold">ZY</span></h1>
      <p class="text-muted text-sm mt-2">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <!-- Username Field -->
      <div class="flex flex-col">
        <label class="mb-1.5 text-sm font-medium text-foreground">Username</label>
        <input 
          type="text" 
          formControlName="username"
          placeholder="Enter your username"
          class="bg-surface border border-surface-border rounded-lg px-4 py-2.5 text-sm text-foreground outline-none transition-all duration-200 focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-muted"
        />
      </div>

      <!-- Password Field -->
      <div class="flex flex-col">
        <label class="mb-1.5 text-sm font-medium text-foreground">Password</label>
        <input 
          type="password" 
          formControlName="password"
          placeholder="Enter your password"
          class="bg-surface border border-surface-border rounded-lg px-4 py-2.5 text-sm text-foreground outline-none transition-all duration-200 focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-muted"
        />
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-2.5 rounded-lg">
          {{ errorMessage }}
        </div>
      }

      <!-- Submit Button -->
      <button 
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full btn-brand"
      >
        <span class="flex items-center justify-center gap-2">
          Login <mat-icon class="transition-transform group-hover:translate-x-1">arrow_forward</mat-icon>
        </span>
      </button>
    </form>

    <!-- Footer -->
    <p class="text-center text-muted text-xs mt-6">
      Powered by LearnZY Framework
    </p>
  </div>
</div>

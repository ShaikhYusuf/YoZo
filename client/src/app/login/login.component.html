<!-- Login Page -->
<div class="min-h-screen flex items-center justify-center bg-background px-4">

  <!-- Login Card -->
  <div class="w-full max-w-md bg-surface border border-border rounded-lg p-8 shadow-md animate-fade-in">

    <!-- Logo / Brand -->
    <div class="text-center mb-8 flex flex-col items-center">
      <div class="flex justify-center items-center w-12 h-12 rounded-lg bg-primary mb-4">
        <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
      </div>
      <h1 class="text-2xl font-semibold text-foreground">YoZo</h1>
      <p class="text-muted text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <!-- Username -->
      <div class="flex flex-col">
        <label class="mb-1 text-sm font-medium text-foreground">Username</label>
        <input
          type="text"
          formControlName="username"
          placeholder="Enter your username"
          class="w-full h-10 bg-surface border border-border rounded-md px-4 text-base text-foreground outline-none transition-colors focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary placeholder:text-muted"
        />
      </div>

      <!-- Password -->
      <div class="flex flex-col">
        <label class="mb-1 text-sm font-medium text-foreground">Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full h-10 bg-surface border border-border rounded-md px-4 text-base text-foreground outline-none transition-colors focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary placeholder:text-muted"
        />
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
        <div class="bg-danger-light border border-danger-border text-danger text-sm px-4 py-3 rounded-md animate-shake">
          {{ errorMessage }}
        </div>
      }

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full h-10 bg-primary text-white font-medium rounded-md transition-colors hover:bg-primary-hover focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none active:scale-[0.98] flex items-center justify-center gap-2"
      >
        @if (isLoading) {
          <span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
          Signing in…
        } @else {
          Sign In
        }
      </button>
    </form>

    <!-- Footer -->
    <p class="text-center text-muted text-xs mt-6">
      Powered by YoZo Platform
    </p>
  </div>
</div>

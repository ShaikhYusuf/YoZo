<!-- Profile Page -->
<div class="min-h-screen flex items-center justify-center bg-background px-4 py-12">
  <div class="w-full max-w-md bg-surface border border-border rounded-lg overflow-hidden animate-fade-in">

    <!-- Profile Header -->
    <div class="flex flex-col items-center pt-8 pb-6 px-6">
      <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-white text-2xl font-semibold mb-4">
        {{ userName.charAt(0) }}
      </div>
      <h2 class="text-xl font-semibold text-foreground">{{ userName }}</h2>
      <span class="mt-1">
        <ui-badge variant="info">{{ userRole }}</ui-badge>
      </span>
    </div>

    <!-- Profile Details -->
    <div class="border-t border-border px-6 py-4 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-sm text-muted font-medium">Email</span>
        <span class="text-sm text-foreground">{{ userEmail }}</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-muted font-medium">Status</span>
        <span class="inline-flex items-center gap-1 text-sm text-success font-medium">
          <span class="w-2 h-2 rounded-full bg-success"></span>
          Active
        </span>
      </div>
    </div>

    <!-- Actions -->
    <div class="border-t border-border px-6 py-4 flex justify-center">
      <button class="h-10 bg-primary text-white font-medium px-6 rounded-md transition-colors hover:bg-primary-hover active:scale-[0.98]">
        Edit Profile
      </button>
    </div>
  </div>
</div>

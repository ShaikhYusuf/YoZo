<!-- Profile Page -->
<div class="min-h-screen flex items-center justify-center bg-background px-4 py-12">
  <div class="w-full max-w-md bg-surface/80 backdrop-blur-md border border-surface-border shadow-glass rounded-2xl overflow-hidden animate-fade-in">
    
    <!-- Profile Header -->
    <div class="flex flex-col items-center pt-8 pb-6 px-6">
      <div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-indigo-400 flex items-center justify-center text-white text-3xl font-bold shadow-glow mb-4">
        {{ userName.charAt(0) }}
      </div>
      <h2 class="text-2xl font-bold text-foreground tracking-tight">{{ userName }}</h2>
      <span class="mt-1 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-primary-light text-primary border border-primary/20">
        {{ userRole }}
      </span>
    </div>

    <!-- Profile Details -->
    <div class="border-t border-surface-border px-6 py-5 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-sm text-muted font-medium">Email</span>
        <span class="text-sm text-foreground">{{ userEmail }}</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-muted font-medium">Status</span>
        <span class="inline-flex items-center gap-1.5 text-sm text-green-600 font-medium">
          <span class="w-2 h-2 rounded-full bg-green-500"></span>
          Active
        </span>
      </div>
    </div>

    <!-- Actions -->
    <div class="border-t border-surface-border px-6 py-4 flex justify-center">
      <button class="bg-primary text-white font-medium px-6 py-2.5 rounded-lg transition-all duration-200 hover:bg-primary-hover hover:shadow-glow active:scale-95">
        Edit Profile
      </button>
    </div>
  </div>
</div>

<mat-card class="quiz-container">
  <mat-card-title style="display: flex; justify-content: space-between; align-items: center;">
    <span>Quiz</span>
    <div>
      <button mat-icon-button color="primary" (click)="readAloud()" *ngIf="!isReading"><mat-icon>volume_up</mat-icon></button>
      <button mat-icon-button color="warn" (click)="stopReading()" *ngIf="isReading"><mat-icon>stop</mat-icon></button>
    </div>
  </mat-card-title>
  <mat-card-content>
    <div *ngFor="let eachQuiz of quizzes" class="quiz-item">
      <mat-card class="sub-card">
        <p>{{ eachQuiz.question }}</p>
        <p>{{ eachQuiz.answer }}</p>
        <mat-radio-group [(ngModel)]="eachQuiz.selectedAnswer">
          <mat-radio-button
            *ngFor="let option of eachQuiz.options; let i = index"
            [value]="i"
          >
            <span
              [ngClass]="{
                'correct-answer': eachQuiz.answered && i === eachQuiz.answer,
                'wrong-answer':
                  eachQuiz.answered &&
                  i === eachQuiz.selectedAnswer &&
                  i !== eachQuiz.answer
              }"
            >
              {{ option }}
              <mat-icon
                *ngIf="eachQuiz.answered"
                [ngClass]="{
                  'success-icon': i === eachQuiz.answer,
                  'error-icon': i !== eachQuiz.answer
                }"
              >
                {{ i === eachQuiz.answer ? "check_circle" : "cancel" }}
              </mat-icon>
            </span>
          </mat-radio-button>
        </mat-radio-group>
      </mat-card>
    </div>
    <div class="button-container">
      <button
        mat-raised-button
        color="primary"
        (click)="submitAnswers()"
        [disabled]="!isAnyQuizAttempted()"
      >
        Submit
      </button>
      <button mat-raised-button color="primary" (click)="resetQuiz()">
        Reset
      </button>
    </div>
  </mat-card-content>
</mat-card>
